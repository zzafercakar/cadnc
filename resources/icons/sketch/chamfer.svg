<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Two edges meeting at a corner -->
  <line x1="5" y1="19" x2="5" y2="9" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="19" x2="5" y2="19" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <!-- Chamfer straight bevel line with vivid orange -->
  <line x1="5" y1="11" x2="13" y2="19" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Corner highlight dot -->
  <circle cx="5" cy="19" r="2" fill="#F59E0B" stroke="#D97706" stroke-width="0.8"/>
  <!-- Distance indicators -->
  <line x1="3" y1="11" x2="3" y2="19" stroke="#94A3B8" stroke-width="0.6" stroke-dasharray="1,1"/>
  <line x1="5" y1="21" x2="13" y2="21" stroke="#94A3B8" stroke-width="0.6" stroke-dasharray="1,1"/>
  <text x="14" y="16" font-size="5" font-weight="bold" fill="#F59E0B" font-family="sans-serif">D</text>
</svg>
